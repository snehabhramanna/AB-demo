<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Image & PDF Converter</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<link rel="stylesheet" href="style.css">
<script src="script.js"> </script>


</head>

<body>

<div class="container">

<div class="topbar">
<h1>Ultimate Converter</h1>
<div class="toggle" onclick="toggleTheme()">Toggle Theme</div>
</div>

<div class="tabs">
<button class="active" onclick="showTab('image',this)">Image</button>
<button onclick="showTab('pdf',this)">PDF</button>
</div>

<!-- IMAGE SECTION -->
<div id="image" class="section active">

<div class="dropzone" id="dropzone">Drag & Drop Image or Click</div>
<input type="file" id="imageInput" accept="image/*" hidden>

<select id="format">
<option value="image/jpeg">JPG</option>
<option value="image/png">PNG</option>
<option value="image/webp">WEBP</option>
</select>

<label>Resize Width</label>
<input type="number" id="width">

<label>Resize Height</label>
<input type="number" id="height">
<!--It controls the image compression quality when converting the image.-->
<label>Compression Quality (0.1 - 1)</label>
<input type="range" id="quality" min="0.1" max="1" step="0.1" value="1">

<button class="action" onclick="convertImage()">Convert & Download</button>
<button class="action" onclick="resetImage()">Reset</button>

<div class="loader" id="imageLoader"><div class="spinner"></div></div>
<div class="info" id="imageInfo"></div>
<div class="preview" id="imagePreview"></div>

</div>

<!-- PDF SECTION -->
<div id="pdf" class="section">

<input type="file" id="pdfInput" accept="application/pdf" multiple>

<button class="action" onclick="mergePDF()">Merge PDFs</button>
<button class="action" onclick="pdfToImages()">PDF → Images</button>

<div class="loader" id="pdfLoader"><div class="spinner"></div></div>
<div class="info" id="pdfInfo"></div>
<div class="preview" id="pdfPreview"></div>

</div>

</div>



</body>
</html>
